specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: UnitedHealth Group
providerId: unitedhealth
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare
  - FHIR
  - Rate Limiting
  - B2B
description: UnitedHealth Group does not publish public, numeric API rate limits. Throughput on the
  CMS Patient Access FHIR endpoints is governed by app-registration and member-consent flows; commercial
  Optum / UHC integrations have throughput defined per partner agreement.
sources:
  - https://developer.uhc.com
  - https://developer.optum.com
notes: No public rate-limit documentation. Limits are governed per app registration (FHIR / Patient
  Access) or per commercial integration contract.
responseCodes:
  throttled: 429
limits:
  - name: Patient Access FHIR
    scope: app
    metric: varies
    limit: see UHC / Optum developer portal app onboarding
    notes: CMS Patient Access endpoints; throughput tied to registered app and member consent.
  - name: Commercial integration
    scope: contract
    metric: varies
    limit: see Optum / UHC commercial agreement
policies:
  - name: App Registration
    description: Patient Access FHIR clients must register through the UHC / Optum developer portal
      and meet CMS Patient Access conformance requirements.
  - name: Commercial Onboarding
    description: Commercial throughput, concurrency, and SLAs are negotiated as part of Optum / UHC
      integration contracts, not published publicly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
