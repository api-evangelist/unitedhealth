naftiko: 1.0.0-alpha2
info:
  label: UnitedHealth Group Optum API — Drug Formulary
  description: 'UnitedHealth Group Optum API — Drug Formulary. 1 operations. Lead operation: UnitedHealth Group List Formulary
    Drug Coverage. Self-contained Naftiko capability covering one Unitedhealth business surface.'
  tags:
  - Unitedhealth
  - Drug Formulary
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITEDHEALTH_API_KEY: UNITEDHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: optum-drug-formulary
    baseUri: https://api.uhc.com/fhir/R4
    description: UnitedHealth Group Optum API — Drug Formulary business capability. Self-contained, no shared references.
    resources:
    - name: MedicationKnowledge
      path: /MedicationKnowledge
      operations:
      - name: listformularydrugs
        method: GET
        description: UnitedHealth Group List Formulary Drug Coverage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: code
          in: query
          type: string
          description: RxNorm drug code
        - name: drug-name
          in: query
          type: string
          description: Drug name search string
        - name: tier
          in: query
          type: string
          description: Formulary tier number filter
        - name: _count
          in: query
          type: integer
          description: Maximum number of results
    authentication:
      type: bearer
      token: '{{env.UNITEDHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: optum-drug-formulary-rest
    port: 8080
    description: REST adapter for UnitedHealth Group Optum API — Drug Formulary. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/medicationknowledge
      name: medicationknowledge
      description: REST surface for MedicationKnowledge.
      operations:
      - method: GET
        name: listformularydrugs
        description: UnitedHealth Group List Formulary Drug Coverage
        call: optum-drug-formulary.listformularydrugs
        with:
          code: rest.code
          drug-name: rest.drug-name
          tier: rest.tier
          _count: rest._count
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: optum-drug-formulary-mcp
    port: 9090
    transport: http
    description: MCP adapter for UnitedHealth Group Optum API — Drug Formulary. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: unitedhealth-group-list-formulary-drug
      description: UnitedHealth Group List Formulary Drug Coverage
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: optum-drug-formulary.listformularydrugs
      with:
        code: tools.code
        drug-name: tools.drug-name
        tier: tools.tier
        _count: tools._count
      outputParameters:
      - type: object
        mapping: $.
