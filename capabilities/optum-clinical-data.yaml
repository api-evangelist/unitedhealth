naftiko: 1.0.0-alpha2
info:
  label: UnitedHealth Group Optum API — Clinical Data
  description: 'UnitedHealth Group Optum API — Clinical Data. 1 operations. Lead operation: UnitedHealth Group List Member
    Conditions. Self-contained Naftiko capability covering one Unitedhealth business surface.'
  tags:
  - Unitedhealth
  - Clinical Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITEDHEALTH_API_KEY: UNITEDHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: optum-clinical-data
    baseUri: https://api.uhc.com/fhir/R4
    description: UnitedHealth Group Optum API — Clinical Data business capability. Self-contained, no shared references.
    resources:
    - name: Condition
      path: /Condition
      operations:
      - name: listconditions
        method: GET
        description: UnitedHealth Group List Member Conditions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
          description: Patient resource ID
          required: true
        - name: clinical-status
          in: query
          type: string
          description: Condition clinical status filter
        - name: _count
          in: query
          type: integer
          description: Maximum number of results
    authentication:
      type: bearer
      token: '{{env.UNITEDHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: optum-clinical-data-rest
    port: 8080
    description: REST adapter for UnitedHealth Group Optum API — Clinical Data. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/condition
      name: condition
      description: REST surface for Condition.
      operations:
      - method: GET
        name: listconditions
        description: UnitedHealth Group List Member Conditions
        call: optum-clinical-data.listconditions
        with:
          patient: rest.patient
          clinical-status: rest.clinical-status
          _count: rest._count
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: optum-clinical-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for UnitedHealth Group Optum API — Clinical Data. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: unitedhealth-group-list-member-conditions
      description: UnitedHealth Group List Member Conditions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: optum-clinical-data.listconditions
      with:
        patient: tools.patient
        clinical-status: tools.clinical-status
        _count: tools._count
      outputParameters:
      - type: object
        mapping: $.
