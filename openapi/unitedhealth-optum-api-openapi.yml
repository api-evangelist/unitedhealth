openapi: 3.1.0
info:
  title: UnitedHealth Group API
  description: >-
    The UnitedHealth Group interoperability APIs provide access to healthcare data including patient records, claims, provider directories, and formulary information in compliance with CMS interoperability rules. They follow HL7 FHIR standards for health data exchange.
  version: '1.0'
  contact:
    name: UnitedHealth Developer Support
    url: https://www.uhc.com/legal/interoperability-apis
externalDocs:
  description: Documentation
  url: https://www.uhc.com/legal/interoperability-apis
servers:
  - url: https://api.uhc.com
    description: Production
tags:
  - name: Healthcare
    description: Healthcare operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Healthcare
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
