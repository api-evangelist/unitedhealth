meters:
  - name: contract
    description: Optum / UHC commercial integration agreement (eligibility, claims, prior auth, network).
    unit: varies
    aggregation: sum
  - name: patient_access_apps
    description: Registered Patient Access FHIR apps; not directly billed but tracked for conformance.
    unit: app
    aggregation: count
principles:
  - name: Visibility
    description: API consumption is not separately metered. Track FHIR / commercial call volume against
      the integration contract and member-consent records.
  - name: Allocation
    description: Allocate UnitedHealth integration cost to the line-of-business sponsoring the integration
      (clinical, claims operations, member experience) rather than per-call.
  - name: Optimization
    description: Optimize at the contract level - reduce redundant eligibility lookups, consolidate
      claims-status polling, prefer FHIR bulk export over per-resource calls where supported.
  - name: Accountability
    description: Assign ownership to the team holding the Optum / UHC commercial relationship; review
      partner usage against contracted volumes and conformance metrics.
