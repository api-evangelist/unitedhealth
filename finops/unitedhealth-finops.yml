description: UnitedHealth Group does not expose a metered API billing surface. CMS Patient Access
  FHIR endpoints are free under regulatory mandate; commercial integrations are contracted through
  Optum / UnitedHealthcare. FinOps maps to enterprise contracts and downstream healthcare spend rather
  than per-call pricing.
sources:
  - https://developer.uhc.com
  - https://developer.optum.com
notes: No public usage-based API billing exists. This artifact captures the contractual surface;
  underlying claims, eligibility, and provider-network economics live in the broader UnitedHealth
  payer business, not at the API layer.
