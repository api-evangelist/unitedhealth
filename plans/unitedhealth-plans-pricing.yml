provider: UnitedHealth Group
providerId: unitedhealth
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare
  - Health Insurance
  - FHIR
  - B2B
description: UnitedHealth Group (UnitedHealthcare and Optum) does not publish a self-serve API pricing
  page. Public-facing FHIR / interoperability APIs are mandated under the CMS Patient Access Rule
  and are free for member access; B2B integrations (eligibility, claims, prior auth, EDI) are contracted
  through Optum / UHC payer or provider agreements rather than priced as a developer product.
sources:
  - https://developer.uhc.com
  - https://developer.optum.com
notes: No public, self-serve, metered API pricing. Free FHIR / Patient Access endpoints exist for
  members under regulatory mandate; commercial integrations are contracted directly with Optum or
  UnitedHealthcare.
plans:
  - id: unitedhealth-contact-sales
    name: Contact Sales
    type: enterprise
    description: All commercial UnitedHealth API integrations are contracted with Optum or UnitedHealthcare;
      regulatory FHIR endpoints are available without contract for compliant member-access flows.
    entries:
      - label: Commercial Integration
        name: commercial_integration
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Optum / UHC Commercial Agreement
      - name: CMS Patient Access FHIR (regulatory, member-only)
      - name: Provider EDI / X12 Integrations
