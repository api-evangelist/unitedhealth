"""
UnitedHealth Group GraphQL Schema
Developer Portal: https://developer.uhc.com/
Interoperability APIs: https://www.uhc.com/legal/interoperability-apis
Standards: HL7 FHIR R4, CMS-9115-F, Da Vinci PDex Plan Net, Da Vinci Drug Formulary IG
"""

# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  """Retrieve authenticated member data."""
  member(id: ID!): Member

  """Search insurance plans by criteria."""
  plan(planId: ID, groupNumber: String, planType: PlanType): InsurancePlan

  """Provider directory search and lookup."""
  provider: ProviderQuery

  """Claims history and status access."""
  claim: ClaimQuery

  """Prior authorization lookup."""
  priorAuthorization(authNumber: ID!): PriorAuthorization

  """Drug formulary and pharmacy services."""
  formulary: FormularyQuery

  """Plan benefits lookup."""
  benefits(planId: ID!, serviceCategory: String): PlanBenefits

  """Optum digital health services."""
  digitalHealth(memberId: ID!): DigitalHealth

  """API key management."""
  apiKey(keyId: ID!): APIKey

  """Webhook subscription lookup."""
  webhook(webhookId: ID!): Webhook
}

type Mutation {
  """Submit a specialist referral request."""
  submitReferral(input: ReferralInput!): ReferralRequest

  """Submit a prior authorization request."""
  requestPriorAuthorization(input: PriorAuthInput!): PriorAuthorization

  """Update member profile information."""
  updateMemberProfile(memberId: ID!, input: MemberProfileInput!): MemberProfile

  """Register a webhook for event notifications."""
  registerWebhook(input: WebhookInput!): Webhook

  """Deactivate an active webhook subscription."""
  deactivateWebhook(webhookId: ID!): Webhook

  """Generate an API key for developer portal access."""
  createAPIKey(input: APIKeyInput!): APIKey

  """Revoke an API key."""
  revokeAPIKey(keyId: ID!): APIKey
}

type Subscription {
  """Stream claim adjudication status updates."""
  claimStatusUpdated(memberId: ID!): ClaimStatus

  """Receive prior authorization decision events."""
  authorizationDecision(memberId: ID!): AuthStatus

  """Notify on member eligibility or coverage changes."""
  eligibilityChanged(memberId: ID!): MemberEligibility
}

